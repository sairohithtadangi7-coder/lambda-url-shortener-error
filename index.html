<script>

async function shorten(){

let longUrl = document.getElementById("urlInput").value;

if(!longUrl){
document.getElementById("result").innerHTML="Please enter a URL";
return;
}

try{

let response = await fetch("https://008jmqrlo7.execute-api.us-east-1.amazonaws.com/shorten",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
url: longUrl
})
});

let data = await response.json();

/* FIX: parse lambda body */
let parsed = JSON.parse(data.body);

document.getElementById("result").innerHTML =
"Short URL: <a href='"+parsed.short_url+"' target='_blank'>"+parsed.short_url+"</a>";

}

catch(error){
document.getElementById("result").innerHTML="Error connecting to API";
}

}

</script>
